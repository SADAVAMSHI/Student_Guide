<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Guide - AI Learning Path</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Student Guide</h1>
        <div class="subtitle">Your AI-Powered Learning Path Generator</div>

        <div class="input-box">
            <input type="text" id="topic" placeholder="What topic do you need to learn?" autocomplete="off">
            <button id="generate-btn">Generate</button>
        </div>

        <div id="loader" class="loader">Analyzing industry standards and building your path...</div>
        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
