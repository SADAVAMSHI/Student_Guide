<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Guide - AI Learning Path</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({ startOnLoad: false, theme: 'dark' });
    </script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen" class="screen">
        <div class="login-box">
            <h2>Welcome</h2>
            <p class="subtitle">Log in to start learning</p>
            <form id="login-form">
                <input type="text" id="username" placeholder="Username" required autocomplete="off">
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>

    <div id="app-screen" class="screen hidden">
        <div class="container">
            <div class="top-nav">
               <btn>logout</btn>
            </div>

            <h1>Student Guide</h1>
            <div class="subtitle">Your AI-Powered Learning Path Generator</div>

            <div class="input-container">
                <div class="input-box">
                    <input type="text" id="topic" placeholder="What do you want to learn?" autocomplete="off">
                    <button id="generate-btn">Generate</button>
                </div>
            </div>

            <div class="trending-container">
                <span class="trending-label">Trending:</span>
                <button class="trending-pill">Prompt Engineering</button>
                <button class="trending-pill">Agentic AI</button>
                <button class="trending-pill">Machine Learning</button>
                <button class="trending-pill">Full-Stack React</button>
            </div>

            <div id="loader" class="loader">Analyzing industry standards & building your path...</div>
            <div id="result"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
